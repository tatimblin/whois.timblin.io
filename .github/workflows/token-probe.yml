name: Token Reissue Probe (TEMPORARY)

# TEMPORARY experiment: runs refresh-session hourly to learn whether/when
# Lyft reissues lyftAccessToken via browser navigation as it nears expiry.
# Refresh-only (no query / no CSV commit) so it never pollutes bike-stats.csv.
# Delete this workflow once the reissue window is characterized.

on:
  schedule:
    - cron: '17 * * * *'  # hourly at :17
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Checkout baywheels-stats actions
        uses: actions/checkout@v5
        with:
          repository: tatimblin/baywheels-stats
          token: ${{ secrets.GH_PAT }}
          path: .github/actions/baywheels-stats

      - name: Refresh session tokens (probe)
        uses: ./.github/actions/baywheels-stats/refresh-session
        with:
          github_token: ${{ secrets.GH_PAT }}
        env:
          BAYWHEELS_COOKIES: ${{ secrets.BAYWHEELS_COOKIES }}
